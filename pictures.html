<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pictures gallery of Sheng Cao">
  <title>Sheng Cao | Pictures</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <div class="page-shell">
    <nav class="site-nav" aria-label="Primary">
      <a class="site-nav__link" href="index.html#academic-cv">Academic CV</a>
      <a class="site-nav__link site-nav__link--active" href="pictures.html">Pictures</a>
    </nav>

    <main class="gallery-page" aria-label="Pictures gallery">
      <header class="gallery-hero">
        <p class="gallery-hero__eyebrow">Pictures</p>
        <h1 class="gallery-hero__title">Life</h1>
        <p class="gallery-hero__description">
          A few moments from daily life, work, and travel.
        </p>
      </header>

      <section class="gallery-layout gallery-layout--life" aria-label="Life photo wall">
        <div class="gallery-column gallery-column--main">
          <figure class="gallery-card gallery-card--landscape">
            <img class="gallery-card__image" src="assets/photos/life/lab.webp" alt="Lab" width="2893" height="1279" loading="eager" fetchpriority="high" decoding="async">
            <figcaption class="gallery-card__caption">In the lab.</figcaption>
          </figure>

          <figure class="gallery-card gallery-card--landscape">
            <img class="gallery-card__image" src="assets/photos/life/The_sunset_after_work.webp" alt="The sunset after work" width="2893" height="1279" loading="lazy" decoding="async">
            <figcaption class="gallery-card__caption">After work.</figcaption>
          </figure>

          <figure class="gallery-card gallery-card--landscape">
            <img class="gallery-card__image" src="assets/photos/life/Yulong_Snow_Mountain.webp" alt="Yulong Snow Mountain" width="2893" height="1279" loading="lazy" decoding="async">
            <figcaption class="gallery-card__caption">Yulong Snow Mountain.</figcaption>
          </figure>
        </div>

        <div class="gallery-column gallery-column--side">
          <figure class="gallery-card gallery-card--portrait">
            <img class="gallery-card__image" src="assets/photos/life/always_on_the_route.webp" alt="Always on the route" width="1024" height="2316" loading="lazy" decoding="async">
            <figcaption class="gallery-card__caption">On the route.</figcaption>
          </figure>

          <figure class="gallery-card gallery-card--portrait">
            <img class="gallery-card__image" src="assets/photos/life/Yellow_Mountain.webp" alt="Yellow Mountain" width="1279" height="1706" loading="lazy" decoding="async">
            <figcaption class="gallery-card__caption">Yellow Mountain.</figcaption>
          </figure>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
